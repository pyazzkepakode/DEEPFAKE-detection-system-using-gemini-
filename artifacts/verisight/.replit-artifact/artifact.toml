kind = "web"
previewPath = "/"
title = "VeriSight"
version = "1.0.0"
id = "artifacts/verisight"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24837

[services.development]
run = "pnpm --filter @workspace/verisight run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/verisight", "run", "build" ]
publicDir = "artifacts/verisight/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24837"
BASE_PATH = "/"
